[taxonomies]
  category = "kategorie"
  tag = "tagi"
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
[sitemap]
  changefreq = "daily"
  priority = 0.5
  filename = "sitemap.xml"
