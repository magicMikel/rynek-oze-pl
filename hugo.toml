defaultContentLanguage = "pl"
enableRobotsTXT = true
summaryLength = 160
[pagination]
  pagerSize = 12
copyright = "© 2026 rynek-oze.pl"
[params]
  siteName = "Rynek OZE"
  siteDescription = "Aktualności i analizy polskiego rynku energii odnawialnej"
  siteKeywords = "rynek energii, ceny prądu, transformacja energetyczna, aukcje OZE"
  author = "Redakcja Rynek OZE"
